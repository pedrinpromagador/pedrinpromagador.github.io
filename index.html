        }

        .btn-step {

            padding: 16px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 16px;
        }

        .btn-step:hover:not(:disabled) {
            background: rgba(255, 0, 0, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .btn-step.done {

        }

        .btn-step:disabled {
            opacity: 0.3;

        }

        .status-area {
            display: none;
            margin-top: 20px;
        }

        .bar-container {
            background: rgba(255, 255, 255, 0.05);

            border-radius: 10px;
            overflow: hidden;

        }

        .bar-fill {
            background: var(--primary);
            width: 0%;
            height: 100%;
            box-shadow: 0 0 10px var(--primary);
            transition: 0.4s;
        }

        .log {
            font-size: 11px;

            font-family: monospace;
            letter-spacing: 1px;
        }

        /* BOTÃO DE DOWNLOAD VERMELHO */
        .btn-final {

            padding: 20px;
            border-radius: 12px;
            width: 100%;
            font-weight: 900;

            display: none;
            font-size: 18px;
            margin-top: 10px;

        }

            from { box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
            to { box-shadow: 0 0 40px rgba(255, 0, 0, 0.8); }
        }
    </style>
</head>
