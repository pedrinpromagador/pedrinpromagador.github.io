<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robingolart - Verificação</title>
    <style>
        body { background: #050505; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: #111; border: 1px solid #222; border-radius: 20px; padding: 25px; width: 100%; max-width: 350px; text-align: center; border-top: 4px solid #007bff; }
        .btn-passo { background: #1a1a1a; color: white; border: 1px solid #333; padding: 15px; border-radius: 10px; width: 100%; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        .btn-passo.check { border-color: #28a745; color: #28a745; }
        .barra-fundo { background:#1a1a1a; height:8px; border-radius:10px; margin:10px 0; display:none; overflow:hidden; }
        .barra-progresso { background:#007bff; width:0%; height:100%; transition:0.3s; }
        .btn-final { background: #28a745; color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="color: #007bff; margin:0 0 15px 0;">🛡️ Robingolart Safe</h2>
        
        <button id="s1" class="btn-passo" onclick="fazer(1, 'https://www.youtube.com/@Robingolart?sub_confirmation=1')">
            1. SE INSCREVER NO CANAL
        </button>

        <button id="s2" class="btn-passo" onclick="fazer(2, 'https://youtu.be/Yrkjy16b6ok')" disabled>
            2. COMENTAR NO VÍDEO
        </button>

        <div id="area-carregando" class="barra-fundo"><div id="p" class="barra-progresso"></div></div>
        <div id="texto-log" style="font-size:11px; color:#555"></div>

        <button id="btn-fim" class="btn-final" onclick="ir()">BAIXAR DELTA EXECUTOR</button>
    </div>

    <script>
        // ÚNICO LUGAR PARA O LINK DO ENCURTANET:
        const LINK_DINHEIRO = "https://seulink.digital/qKVRxxcSfI";

        let c1 = false; let c2 = false;
        function fazer(n, u) {
            window.open(u, '_blank');
            if(n === 1) {
                document.getElementById('s1').classList.add('check');
                document.getElementById('s1').innerHTML = "1. CONCLUÍDO ✅";
                document.getElementById('s2').disabled = false;
                c1 = true;
            } else {
                document.getElementById('s2').classList.add('check');
                document.getElementById('s2').innerHTML = "2. CONCLUÍDO ✅";
                c2 = true;
                if(c1 && c2) carregar();
            }
        }

        function carregar() {
            document.getElementById('area-carregando').style.display = 'block';
            let v = 0;
            const t = setInterval(() => {
                v += 2;
                document.getElementById('p').style.width = v + "%";
                document.getElementById('texto-log').innerText = "Segurança: " + v + "%";
                if(v >= 100) {
                    clearInterval(t);
                    document.getElementById('btn-fim').style.display = 'block';
                    document.getElementById('texto-log').innerText = "Acesso Liberado!";
                }
            }, 50);
        }

        function ir() { window.location.href = LINK_DINHEIRO; }
    </script>
</body>
</html>
